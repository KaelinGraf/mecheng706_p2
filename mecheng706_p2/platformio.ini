; PlatformIO project configuration for the firefighter controller.
;
; Two build environments share the same source tree:
;   * megaatmega2560 - the on-robot target (Arduino Mega 2560).
;   * native         - host build that compiles the controller against the
;                      Sim HAL backend. Used as a smoke test that the
;                      hardware-abstracted code still compiles and links
;                      without any Arduino dependencies. The Python bindings
;                      that drive the simulator live in python_bindings/ and
;                      are built separately via CMake.

[platformio]
src_dir = src
default_envs = megaatmega2560

; ---------------------------------------------------------------------------
; Common library options used by both environments.
; ---------------------------------------------------------------------------
[common]
build_flags =
    -std=gnu++14
    -Wall

; ---------------------------------------------------------------------------
; Arduino Mega target (the actual robot)
; ---------------------------------------------------------------------------
; src_filter excludes the host entry point so the .ino is the sole main.
[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
build_flags = ${common.build_flags}
build_src_filter =
    +<*>
    -<firefighter_host.cpp>
lib_deps =
    adafruit/Adafruit BNO08x@^1.2.3
    arduino-libraries/Servo
lib_ldf_mode = chain+
lib_ignore =
    hal_sim
monitor_speed = 115200

; ---------------------------------------------------------------------------
; Native (host) target - compiles the controller against the Sim HAL.
; ---------------------------------------------------------------------------
; Excludes the .ino and the Arduino HAL backend so nothing pulls Arduino.h.
[env:native]
platform = native
build_flags =
    ${common.build_flags}
    -DUNIT_TEST_NATIVE
build_src_filter =
    +<*>
    -<firefighter_arduino.ino>
lib_ldf_mode = chain+
lib_ignore =
    hal_arduino
